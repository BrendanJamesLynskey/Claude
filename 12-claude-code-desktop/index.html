<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Desktop — The Native GUI — Anthropic Claude Series</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
  :root {
    --amber:  #f5a623;
    --green:  #4ecb8d;
    --purple: #a78bfa;
    --blue:   #60a5fa;
    --bg:     #0a0a0f;
    --bg2:    #10101a;
    --border: #2a2a3a;
    --text:   #e8e8f0;
    --muted:  #8888a8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(245,166,35,0.1) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(78,203,141,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .accent-border-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    box-shadow: 0 0 15px rgba(245,166,35,0.3);
  }
  .container {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 500px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7em;
    color: var(--muted);
    letter-spacing: .12em;
    margin-bottom: .5em;
  }
  .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: .8em;
    font-weight: 500;
    color: var(--bg);
    background: var(--amber);
    padding: .1em .45em;
    border-radius: 3px;
    letter-spacing: .04em;
    display: inline-block;
    margin-bottom: .8em;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    color: var(--amber);
    line-height: 1.15;
    margin-bottom: .15em;
  }
  .subtitle {
    font-size: clamp(.8rem, 2.5vw, .95rem);
    color: var(--green);
    font-weight: 300;
    letter-spacing: .03em;
    margin-bottom: .5em;
  }
  .description {
    font-size: .85rem;
    font-weight: 300;
    line-height: 1.7;
    color: var(--muted);
    margin-bottom: 2rem;
  }
  .bar {
    width: 50px; height: 2px;
    background: var(--amber);
    margin: 0 auto 1.8em;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: .8em;
    align-items: center;
  }
  a.btn {
    display: inline-block;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 400;
    letter-spacing: .1em;
    padding: 14px 48px;
    border-radius: 30px;
    transition: all .3s ease;
    width: 260px;
    text-align: center;
  }
  a.btn.primary {
    color: var(--text);
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.4);
    box-shadow: 0 4px 20px rgba(245,166,35,0.1);
  }
  a.btn.primary:hover {
    background: rgba(245,166,35,0.2);
    border-color: var(--amber);
    box-shadow: 0 4px 30px rgba(245,166,35,0.2);
  }
  a.btn.secondary {
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
  }
  a.btn.secondary:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }
  .badge {
    font-size: .65rem;
    letter-spacing: .1em;
    color: var(--amber);
    opacity: .7;
    margin-left: .5rem;
  }
  .back {
    margin-top: 2em;
    font-size: .78rem;
    color: var(--muted);
  }
  .back a {
    color: var(--amber);
    text-decoration: none;
    letter-spacing: .04em;
  }
  .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="accent-border-top"></div>
  <div class="container">
    <div class="series-label">ANTHROPIC CLAUDE SERIES</div>
    <span class="num">12</span>
    <h1>Claude Code Desktop</h1>
    <div class="subtitle">The Code tab in the Claude Desktop app &mdash; sessions, diffs, permissions, and MCP in one window</div>
    <div class="bar"></div>
    <p class="description">Choose your viewing experience</p>
    <div class="buttons">
      <a href="desktop.html" class="btn" id="btnDesktop">DESKTOP</a>
      <a href="mobile.html" class="btn" id="btnMobile">MOBILE</a>
    </div>
    <div class="back"><a href="../">&larr; All presentations</a></div>
  </div>
  <script>
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
                 (navigator.maxTouchPoints > 1 && window.innerWidth < 768);
  var btnD = document.getElementById('btnDesktop');
  var btnM = document.getElementById('btnMobile');
  if (isMobile) {
    btnM.classList.add('primary');
    btnD.classList.add('secondary');
    btnM.innerHTML += '<span class="badge">RECOMMENDED</span>';
  } else {
    btnD.classList.add('primary');
    btnM.classList.add('secondary');
    btnD.innerHTML += '<span class="badge">RECOMMENDED</span>';
  }
  </script>
</body>
</html>
